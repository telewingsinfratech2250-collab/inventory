<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock ERP</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  margin:0;
  padding:15px;
}

/* LOGIN */
#loginPage {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:10px;
}

#loginPage input, #loginPage button {
  padding:12px;
  border-radius:10px;
  border:none;
}

/* APP */
#app { display:none; }

h2 { text-align:center; }

#searchBox {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-bottom:10px;
}

.action-bar {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.action-bar button {
  flex:1;
  background:#00c853;
  color:white;
  border:none;
  border-radius:10px;
  padding:10px;
}

.form {
  background:rgba(255,255,255,0.08);
  padding:10px;
  border-radius:12px;
  margin-bottom:10px;
  display:grid;
  gap:8px;
}

.hidden { display:none; }

input {
  padding:10px;
  border-radius:10px;
  border:none;
}

.stats {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  margin-bottom:10px;
}

.stat {
  background:rgba(255,255,255,0.1);
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:12px;
}

.card {
  background:rgba(255,255,255,0.08);
  padding:12px;
  border-radius:14px;
}

.item-name {
  font-size:14px;
  font-weight:bold;
}

.row {
  display:flex;
  justify-content:space-between;
  font-size:12px;
}

.total {
  color:#00e676;
  margin-top:5px;
  font-weight:bold;
}

/* HISTORY */
.bill {
  background:rgba(255,255,255,0.08);
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.bill-title {
  font-weight:bold;
  margin-bottom:5px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <h2>🔐 Login</h2>
  <input type="password" id="password" placeholder="Enter Password">
  <button onclick="checkLogin()">Login</button>
</div>

<!-- APP -->
<div id="app">

<h2>📦 Stock ERP</h2>

<input id="searchBox" placeholder="🔍 Search..." onkeyup="filterItems()">

<div class="action-bar">
  <button onclick="toggleSale()">🧾 Sale</button>
  <button onclick="toggleItem()">📦 Item</button>
  <button onclick="loadHistory()">📜 History</button>
  <button onclick="logout()">🚪 Logout</button>
</div>

<div id="saleForm" class="form hidden">
  <input id="billNo" placeholder="Bill No">
  <input id="item" placeholder="Item Name">
  <input id="color" placeholder="Color">
  <input id="bundle" type="number" placeholder="Bundle">
  <input id="loose" type="number" placeholder="Loose">
  <button onclick="saveSale()">Save Sale</button>
</div>

<div id="itemForm" class="form hidden">
  <input id="newItem" placeholder="Item Name">
  <input id="newColor" placeholder="Color">
  <input id="newBundle" type="number" placeholder="Bundle">
  <input id="newLoose" type="number" placeholder="Loose">
  <button onclick="addItem()">Save Item</button>
</div>

<div class="stats">
  <div class="stat">Items: <span id="items"></span></div>
  <div class="stat">Qty: <span id="qty"></span></div>
</div>

<div id="stockContainer" class="grid"></div>
<div id="historySection" class="hidden"></div>

</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbwZmwbGADEsZuZLthqrj5IhNv0wxl-A88xSWDjf5b8cjkZTMoPzGXw1Q_quXgVWFlulXQ/exec";
const APP_PASSWORD = "tele2026";

let searchValue = "";

/* LOGIN */
function checkLogin() {
  if (password.value === APP_PASSWORD) {
    localStorage.setItem("login","1");
    showApp();
  } else {
    alert("Wrong Password ❌");
  }
}

function showApp() {
  loginPage.style.display = "none";
  app.style.display = "block";
  loadData();
}

function logout() {
  localStorage.removeItem("login");
  location.reload();
}

if (localStorage.getItem("login") === "1") showApp();

/* DATA */
function loadData() {
  historySection.classList.add("hidden");
  stockContainer.innerHTML = "";

  fetch(url)
    .then(res => res.json())
    .then(data => displayData(data));
}

function displayData(data) {
  data = data.filter(i => i.name);

  let grouped = {};
  let totalQty = 0;

  data.forEach(i => {
    if (!grouped[i.name]) grouped[i.name] = [];
    grouped[i.name].push(i);
  });

  for (let name in grouped) {
    if (!name.toLowerCase().includes(searchValue)) continue;

    let total = 0;
    let rows = "";

    grouped[name].forEach(i => {
      let qty = i.bundle + i.loose;
      total += qty;
      totalQty += qty;

      rows += `
        <div class="row">
          <span>${i.color || "No Color"}</span>
          <span>${i.bundle}/${i.loose} = ${qty}</span>
        </div>
      `;
    });

    stockContainer.innerHTML += `
      <div class="card">
        <div class="item-name">${name}</div>
        ${rows}
        <div class="total">Qty: ${total}</div>
      </div>
    `;
  }

  items.innerText = Object.keys(grouped).length;
  qty.innerText = totalQty;
}

function filterItems() {
  searchValue = searchBox.value.toLowerCase();
  loadData();
}

/* FORMS */
function toggleSale() {
  saleForm.classList.toggle("hidden");
  itemForm.classList.add("hidden");
}

function toggleItem() {
  itemForm.classList.toggle("hidden");
  saleForm.classList.add("hidden");
}

/* SAVE */
function saveSale() {
  fetch(url,{
    method:"POST",
    body:JSON.stringify({
      billNo:billNo.value,
      name:item.value,
      color:color.value,
      bundle:bundle.value,
      loose:loose.value
    })
  }).then(()=>{alert("Saved ✅");loadData();});
}

function addItem() {
  fetch(url,{
    method:"POST",
    body:JSON.stringify({
      type:"addItem",
      name:newItem.value,
      color:newColor.value,
      bundle:newBundle.value,
      loose:newLoose.value
    })
  }).then(()=>{alert("Item Added ✅");loadData();});
}

/* HISTORY */
function loadHistory() {
  stockContainer.innerHTML = "";
  historySection.classList.remove("hidden");
  historySection.innerHTML = "";

  fetch(url+"?type=history")
    .then(res=>res.json())
    .then(data=>{
      let grouped={};

      data.forEach(i=>{
        if(!grouped[i.bill]) grouped[i.bill]=[];
        grouped[i.bill].push(i);
      });

      for(let bill in grouped){
        let rows="";

        grouped[bill].forEach(i=>{
          let qty=i.bundle+i.loose;

          rows+=`
          <div class="row">
            <span>${i.name} (${i.color||"No Color"})</span>
            <span>${i.bundle}/${i.loose}=${qty}</span>
          </div>`;
        });

        historySection.innerHTML+=`
        <div class="bill">
          <div class="bill-title">Bill: ${bill}</div>
          ${rows}
        </div>`;
      }
    });
}

setInterval(loadData,500000);
</script>

</body>
</html>
