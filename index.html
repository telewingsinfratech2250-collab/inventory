<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock ERP</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  padding:15px;
}

/* 🔥 IMPORTANT FIX */
.hidden {
  display: none !important;
}

#loginPage {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:10px;
}

input, select, button {
  padding:10px;
  border-radius:10px;
  border:none;
}

#app { display:none; }

h2 { text-align:center; }

#searchBox { width:100%; margin-bottom:10px; }

.action-bar {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.action-bar button {
  flex:1;
  background:#00c853;
  color:white;
}

/* FORM */
.form {
  background:rgba(255,255,255,0.08);
  padding:10px;
  border-radius:12px;
  margin-bottom:10px;
  display:grid;
  gap:8px;
}

/* STATS */
.stats {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  margin-bottom:10px;
}

.stat {
  background:rgba(255,255,255,0.1);
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:12px;
}

.card {
  background:rgba(255,255,255,0.08);
  padding:12px;
  border-radius:14px;
}

.row {
  display:flex;
  justify-content:space-between;
  font-size:12px;
}

.total {
  color:#00e676;
  font-weight:bold;
  margin-top:5px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <h2>🔐 Login</h2>
  <input type="password" id="password">
  <button onclick="checkLogin()">Login</button>
</div>

<!-- APP -->
<div id="app">

<h2>📦 Stock ERP</h2>

<input id="searchBox" placeholder="🔍 Search..." onkeyup="filterItems()">

<div class="action-bar">
  <button onclick="goHome()">🏠 Home</button>
  <button onclick="toggleSale()">🧾 Sale</button>
  <button onclick="toggleItem()">📦 Item</button>
  <button onclick="loadHistory()">📜 History</button>
  <button onclick="logout()">🚪</button>
</div>

<!-- SALE -->
<div id="saleForm" class="form hidden">
  <input id="billNo" placeholder="Bill No">
  <select id="item" onchange="loadColors()"></select>
  <select id="color"></select>
  <input id="bundle" type="number" placeholder="Bundle">
  <input id="loose" type="number" placeholder="Loose">
  <button onclick="saveSale()">Save Sale</button>
</div>

<!-- ITEM -->
<div id="itemForm" class="form hidden">
  <input id="newItem" placeholder="Item Name">
  <input id="newColor" placeholder="Color">
  <input id="newBundle" type="number" placeholder="Bundle">
  <input id="newLoose" type="number" placeholder="Loose">
  <button onclick="addItem()">Save Item</button>
</div>

<div class="stats">
  <div class="stat">Items: <span id="items"></span></div>
  <div class="stat">Qty: <span id="qty"></span></div>
</div>

<div id="stockContainer" class="grid"></div>
<div id="historySection" class="hidden"></div>

</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbzONxFORgQwFbFe7wwGUPzwpmDAn0yBxU1OHtIK4_y-TbsOqFIrwAllg40dIXMixsvMQw/exec";
const APP_PASSWORD = "tele2026";

let globalData = [];
let searchValue = "";
let lastFetchTime = 0;

/* LOGIN */
function checkLogin(){
  if(password.value===APP_PASSWORD){
    localStorage.setItem("login","1");
    showApp();
  } else alert("Wrong ❌");
}

function showApp(){
  loginPage.style.display="none";
  app.style.display="block";
  loadData(true);
}

function logout(){
  localStorage.removeItem("login");
  location.reload();
}

if(localStorage.getItem("login")=="1") showApp();

/* 🔥 FORCE HIDE ON LOAD */
window.onload = function () {
  hideAllForms();
};

/* 🔥 MASTER HIDE */
function hideAllForms(){
  saleForm.classList.add("hidden");
  itemForm.classList.add("hidden");

  // force hide
  saleForm.style.display = "none";
  itemForm.style.display = "none";
}

/* LOAD */
function loadData(force=false){
  let now=Date.now();

  if(!force && now-lastFetchTime<5000){
    displayData(globalData);
    return;
  }

  fetch(url)
    .then(r=>r.json())
    .then(data=>{
      globalData=data;
      lastFetchTime=now;
      displayData(data);
      loadItemsDropdown();
    });
}

/* HOME */
function goHome(){
  hideAllForms();
  historySection.classList.add("hidden");
  loadData(true);
}

/* DROPDOWN */
function loadItemsDropdown(){
  let items=[...new Set(globalData.map(i=>i.name))];
  item.innerHTML="";
  items.forEach(n=>{
    item.innerHTML+=`<option>${n}</option>`;
  });
  loadColors();
}

function loadColors(){
  let selected=item.value;
  let colors=globalData.filter(i=>i.name==selected).map(i=>i.color||"No Color");

  color.innerHTML="";
  colors.forEach(c=>{
    color.innerHTML+=`<option>${c}</option>`;
  });
}

/* DISPLAY */
function displayData(data){
  let grouped={}, totalQty=0;
  stockContainer.innerHTML="";

  data.forEach(i=>{
    if(!grouped[i.name]) grouped[i.name]=[];
    grouped[i.name].push(i);
  });

  for(let name in grouped){
    if(!name.toLowerCase().includes(searchValue)) continue;

    let total=0, rows="";
    grouped[name].forEach(i=>{
      let qty=i.bundle+i.loose;
      total+=qty;
      totalQty+=qty;

      rows+=`<div class="row">
        <span>${i.color||"No Color"}</span>
        <span>${i.bundle}/${i.loose}=${qty}</span>
      </div>`;
    });

    stockContainer.innerHTML+=`
    <div class="card">
      <b>${name}</b>
      ${rows}
      <div class="total">Qty: ${total}</div>
    </div>`;
  }

  items.innerText=Object.keys(grouped).length;
  qty.innerText=totalQty;
}

/* SEARCH */
function filterItems(){
  searchValue=searchBox.value.toLowerCase();
  displayData(globalData);
}

/* SHOW FORMS */
function toggleSale(){
  hideAllForms();
  historySection.classList.add("hidden");

  saleForm.classList.remove("hidden");
  saleForm.style.display = "grid";
}

function toggleItem(){
  hideAllForms();
  historySection.classList.add("hidden");

  itemForm.classList.remove("hidden");
  itemForm.style.display = "grid";
}

/* SAVE */
function saveSale(){
  fetch(url,{
    method:"POST",
    body:JSON.stringify({
      billNo:billNo.value,
      name:item.value,
      color:color.value,
      bundle:bundle.value,
      loose:loose.value
    })
  }).then(()=>{
    alert("Saved ✅");
    hideAllForms();
    loadData(true);
  });
}

function addItem(){
  fetch(url,{
    method:"POST",
    body:JSON.stringify({
      type:"addItem",
      name:newItem.value,
      color:newColor.value,
      bundle:newBundle.value,
      loose:newLoose.value
    })
  }).then(()=>{
    alert("Item Added ✅");
    hideAllForms();
    loadData(true);
  });
}

/* HISTORY */
function loadHistory(){
  hideAllForms();

  stockContainer.innerHTML="";
  historySection.classList.remove("hidden");
  historySection.innerHTML="Loading...";

  fetch(url+"?type=history")
    .then(r=>r.json())
    .then(data=>{
      let grouped={};

      data.forEach(i=>{
        if(!grouped[i.bill]) grouped[i.bill]=[];
        grouped[i.bill].push(i);
      });

      historySection.innerHTML="";

      for(let bill in grouped){
        let rows="";
        grouped[bill].forEach(i=>{
          let qty=i.bundle+i.loose;

          rows+=`<div class="row">
            <span>${i.name} (${i.color||"No Color"})</span>
            <span>${i.bundle}/${i.loose}=${qty}</span>
          </div>`;
        });

        historySection.innerHTML+=`
        <div class="card">
          <b>Bill: ${bill}</b>
          ${rows}
        </div>`;
      }
    });
}
</script>

</body>
</html>
