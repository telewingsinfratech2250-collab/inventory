<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock ERP</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  padding:15px;
  padding-bottom:80px; /* space for bottom nav */
}

/* HIDE */
.hidden { display:none !important; }

input, select, button {
  padding:10px;
  border-radius:10px;
  border:none;
}

/* LOGIN */
#loginPage {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:10px;
}

#app { display:none; }

/* FORM */
.form {
  background:rgba(255,255,255,0.08);
  padding:10px;
  border-radius:12px;
  margin-bottom:10px;
  display:grid;
  gap:8px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:12px;
}

.card {
  background:rgba(255,255,255,0.08);
  padding:12px;
  border-radius:14px;
}

.row {
  display:flex;
  justify-content:space-between;
  font-size:12px;
}

.total {
  color:#00e676;
  font-weight:bold;
}

/* 🔥 BOTTOM NAV */
.bottom-nav {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:8px 0;
  border-top:1px solid #333;
}

.bottom-nav button {
  background:none;
  color:#aaa;
  border:none;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:12px;
}

/* ACTIVE */
.bottom-nav button.active {
  color:#00e676;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <h2>🔐 Login</h2>
  <input type="password" id="password">
  <button onclick="checkLogin()">Login</button>
</div>

<!-- APP -->
<div id="app">

<h2>📦 Stock ERP</h2>

<input id="searchBox" placeholder="🔍 Search..." onkeyup="filterItems()">

<!-- SALE -->
<div id="saleForm" class="form hidden">
  <input id="billNo" placeholder="Bill No">
  <select id="item"></select>
  <input id="bundle" type="number" placeholder="Bundle">
  <input id="loose" type="number" placeholder="Loose">
  <button onclick="saveSale()">Save</button>
</div>

<!-- ITEM -->
<div id="itemForm" class="form hidden">
  <input id="newItem" placeholder="Item Name">
  <input id="newBundle" type="number" placeholder="Bundle">
  <input id="newLoose" type="number" placeholder="Loose">
  <button onclick="addItem()">Save</button>
</div>

<div id="stockContainer" class="grid"></div>
<div id="historySection" class="hidden"></div>

</div>

<!-- 🔥 BOTTOM NAV -->
<div class="bottom-nav">
  <button id="navHome" onclick="goHome()">🏠<span>Home</span></button>
  <button id="navSale" onclick="toggleSale()">🧾<span>Sale</span></button>
  <button id="navItem" onclick="toggleItem()">📦<span>Item</span></button>
  <button id="navHistory" onclick="loadHistory()">📜<span>History</span></button>
  <button onclick="logout()">🚪<span>Logout</span></button>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbzShY5J9BiAYSrDl_RXdIbvcBk0JbQ4s3qha4JIkOrKXzjlpv43GZC18Cc7hekZXGdHQQ/exec";
const APP_PASSWORD = "tele2026";

let globalData = [];
let historyData = [];
let searchValue = "";
let currentView = "stock";

/* LOGIN */
function checkLogin(){
  if(password.value===APP_PASSWORD){
    localStorage.setItem("login","1");
    showApp();
  } else alert("Wrong");
}

function showApp(){
  loginPage.style.display="none";
  app.style.display="block";
  goHome();
}

if(localStorage.getItem("login")=="1") showApp();

function logout(){
  localStorage.removeItem("login");
  location.reload();
}

/* NAV ACTIVE */
function setActive(id){
  document.querySelectorAll(".bottom-nav button").forEach(b=>b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* COMMON */
function hideAllForms(){
  saleForm.classList.add("hidden");
  itemForm.classList.add("hidden");
}

/* HOME */
function goHome(){
  currentView="stock";
  setActive("navHome");
  hideAllForms();
  historySection.classList.add("hidden");
  loadData();
}

/* LOAD */
function loadData(){
  fetch(url)
    .then(r=>r.json())
    .then(data=>{
      globalData=data;
      displayData(data);
      loadItems();
    });
}

/* DROPDOWN */
function loadItems(){
  item.innerHTML="";
  globalData.forEach(i=>{
    item.innerHTML+=`<option>${i.name}</option>`;
  });
}

/* DISPLAY */
function displayData(data){
  stockContainer.innerHTML="";
  data.forEach(i=>{
    if(!i.name.toLowerCase().includes(searchValue)) return;

    let qty=i.bundle+i.loose;

    stockContainer.innerHTML+=`
    <div class="card">
      <b>${i.name}</b>
      <div class="row">Bundle: ${i.bundle}</div>
      <div class="row">Loose: ${i.loose}</div>
      <div class="total">Total: ${qty}</div>
    </div>`;
  });
}

/* SEARCH */
function filterItems(){
  searchValue=searchBox.value.toLowerCase();

  if(currentView==="stock"){
    displayData(globalData);
  } else {
    showHistoryFiltered();
  }
}

/* SALE */
function toggleSale(){
  currentView="stock";
  setActive("navSale");
  hideAllForms();
  historySection.classList.add("hidden");
  saleForm.classList.remove("hidden");
}

/* ITEM */
function toggleItem(){
  currentView="stock";
  setActive("navItem");
  hideAllForms();
  historySection.classList.add("hidden");
  itemForm.classList.remove("hidden");
}

/* SAVE */
function saveSale(){
  fetch(url,{
    method:"POST",
    body:JSON.stringify({
      billNo:billNo.value,
      name:item.value,
      bundle:bundle.value,
      loose:loose.value
    })
  }).then(()=>{ alert("Saved"); goHome(); });
}

function addItem(){
  fetch(url,{
    method:"POST",
    body:JSON.stringify({
      type:"addItem",
      name:newItem.value,
      bundle:newBundle.value,
      loose:newLoose.value
    })
  }).then(()=>{ alert("Added"); goHome(); });
}

/* HISTORY */
function loadHistory(){
  currentView="history";
  setActive("navHistory");
  hideAllForms();

  stockContainer.innerHTML="";
  historySection.classList.remove("hidden");
  historySection.innerHTML="Loading...";

  fetch(url+"?type=history")
    .then(r=>r.json())
    .then(data=>{
      historyData=data;
      showHistoryFiltered();
    });
}

function showHistoryFiltered(){
  historySection.innerHTML="";

  historyData.forEach(i=>{
    if(!i.name.toLowerCase().includes(searchValue)) return;

    let qty=i.bundle+i.loose;

    historySection.innerHTML+=`
    <div class="card">
      <b>Bill: ${i.bill}</b>
      <div>${i.name}</div>
      <div>${i.bundle}/${i.loose} = ${qty}</div>
    </div>`;
  });
}
</script>

</body>
</html>
