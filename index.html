<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock ERP</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  padding:15px;
}

.hidden { display:none !important; }

input, select, button {
  padding:10px;
  border-radius:10px;
  border:none;
}

#loginPage {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:10px;
}

#app { display:none; }

.action-bar {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.action-bar button {
  flex:1;
  background:#00c853;
  color:white;
}

.form {
  background:rgba(255,255,255,0.08);
  padding:10px;
  border-radius:12px;
  margin-bottom:10px;
  display:grid;
  gap:8px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:12px;
}

.card {
  background:rgba(255,255,255,0.08);
  padding:12px;
  border-radius:14px;
}

.row {
  display:flex;
  justify-content:space-between;
}

.total {
  color:#00e676;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="loginPage">
  <h2>🔐 Login</h2>
  <input type="password" id="password">
  <button onclick="checkLogin()">Login</button>
</div>

<div id="app">

<h2>📦 Stock ERP</h2>

<div class="action-bar">
  <button onclick="goHome()">🏠</button>
  <button onclick="toggleSale()">🧾</button>
  <button onclick="toggleItem()">📦</button>
  <button onclick="loadHistory()">📜</button>
  <button onclick="logout()">🚪</button>
</div>

<div id="saleForm" class="form hidden">
  <input id="billNo" placeholder="Bill No">
  <select id="item"></select>
  <input id="bundle" type="number" placeholder="Bundle">
  <input id="loose" type="number" placeholder="Loose">
  <button onclick="saveSale()">Save</button>
</div>

<div id="itemForm" class="form hidden">
  <input id="newItem" placeholder="Item Name">
  <input id="newBundle" type="number" placeholder="Bundle">
  <input id="newLoose" type="number" placeholder="Loose">
  <button onclick="addItem()">Save</button>
</div>

<div id="stockContainer" class="grid"></div>
<div id="historySection" class="hidden"></div>

</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbzShY5J9BiAYSrDl_RXdIbvcBk0JbQ4s3qha4JIkOrKXzjlpv43GZC18Cc7hekZXGdHQQ/exec";
const APP_PASSWORD = "tele2026";

let globalData = [];

function checkLogin(){
  if(password.value===APP_PASSWORD){
    localStorage.setItem("login","1");
    showApp();
  } else alert("Wrong");
}

function showApp(){
  loginPage.style.display="none";
  app.style.display="block";
  loadData();
}

if(localStorage.getItem("login")=="1") showApp();

function hideAllForms(){
  saleForm.classList.add("hidden");
  itemForm.classList.add("hidden");
}

function loadData(){
  fetch(url)
    .then(r=>r.json())
    .then(data=>{
      globalData=data;
      displayData(data);
      loadItems();
    });
}

function loadItems(){
  item.innerHTML="";
  globalData.forEach(i=>{
    item.innerHTML+=`<option>${i.name}</option>`;
  });
}

function displayData(data){
  stockContainer.innerHTML="";
  data.forEach(i=>{
    let qty=i.bundle+i.loose;
    stockContainer.innerHTML+=`
    <div class="card">
      <b>${i.name}</b>
      <div class="row">Bundle: ${i.bundle}</div>
      <div class="row">Loose: ${i.loose}</div>
      <div class="total">Total: ${qty}</div>
    </div>`;
  });
}

function toggleSale(){
  hideAllForms();
  saleForm.classList.remove("hidden");
}

function toggleItem(){
  hideAllForms();
  itemForm.classList.remove("hidden");
}

function goHome(){
  hideAllForms();
  historySection.classList.add("hidden");
  loadData();
}

function saveSale(){
  fetch(url,{
    method:"POST",
    body:JSON.stringify({
      billNo:billNo.value,
      name:item.value,
      bundle:bundle.value,
      loose:loose.value
    })
  }).then(()=>{ alert("Saved"); hideAllForms(); loadData(); });
}

function addItem(){
  fetch(url,{
    method:"POST",
    body:JSON.stringify({
      type:"addItem",
      name:newItem.value,
      bundle:newBundle.value,
      loose:newLoose.value
    })
  }).then(()=>{ alert("Added"); hideAllForms(); loadData(); });
}

function loadHistory(){
  hideAllForms();
  stockContainer.innerHTML="";
  historySection.classList.remove("hidden");

  fetch(url+"?type=history")
    .then(r=>r.json())
    .then(data=>{
      historySection.innerHTML="";
      data.forEach(i=>{
        let qty=i.bundle+i.loose;
        historySection.innerHTML+=`
        <div class="card">
          Bill: ${i.bill}<br>
          ${i.name}<br>
          ${i.bundle}/${i.loose} = ${qty}
        </div>`;
      });
    });
}
</script>

</body>
</html>
